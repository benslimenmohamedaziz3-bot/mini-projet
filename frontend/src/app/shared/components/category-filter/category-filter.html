<div class="filter-wrapper">
  <div class="filter-title-row">
    <span class="filter-icon">Feed</span>
    <div>
      <h2>Browse by Category</h2>
      <p class="filter-subtitle">Category changes reuse the preloaded news set for a faster experience.</p>
    </div>
  </div>

  <div class="chips">
    <button
      *ngFor="let category of categories; trackBy: trackByCategoryValue"
      type="button"
      class="chip"
      [class.active]="category.value === selectedCategory"
      (click)="onSelect(category.value)"
    >
      {{ category.label }}
    </button>
  </div>

  <div class="extra-filters">
    <label class="filter-field">
      <span>Filter by Country</span>
      <select [ngModel]="filters.country" (ngModelChange)="onCountryChange($event)">
        <option *ngFor="let option of countryOptions; trackBy: trackByOptionValue" [ngValue]="option.value">
          {{ option.label }}
        </option>
      </select>
    </label>

    <label class="filter-field">
      <span>Filter by Source</span>
      <select [ngModel]="filters.source" (ngModelChange)="onSourceChange($event)">
        <option *ngFor="let option of sourceOptions; trackBy: trackByOptionValue" [ngValue]="option.value">
          {{ option.label }}
        </option>
      </select>
    </label>

    <label class="filter-field">
      <span>Filter by Date</span>
      <input type="date" [ngModel]="filters.date" (ngModelChange)="onDateChange($event)" />
    </label>

    <label class="filter-field">
      <span>Filter by Data Type</span>
      <select [ngModel]="filters.dataType" (ngModelChange)="onDataTypeChange($event)">
        <option *ngFor="let option of dataTypeOptions; trackBy: trackByOptionValue" [ngValue]="option.value">
          {{ option.label }}
        </option>
      </select>
    </label>
  </div>
</div>

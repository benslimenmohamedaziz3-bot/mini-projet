<form (ngSubmit)="onSubmit()">
    @if (errorMessage) {
    <div class="alert alert-danger py-2 mb-3 small">
        {{ errorMessage }}
    </div>
    }

    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" name="name" [(ngModel)]="form.name" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" [(ngModel)]="form.email" 
            (input)="onEmailChange()" [class.is-invalid]="emailExists" 
            [class.is-valid]="!emailExists && form.email.includes('@') && !isCheckingEmail" required>
        @if (isCheckingEmail) {
            <div class="form-text text-muted small">Checking availability...</div>
        }
    </div>

    <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
            <input [type]="showPassword ? 'text' : 'password'" class="form-control" name="password"
                [(ngModel)]="form.password" required>
            <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
                @if (showPassword) {
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9.88 9.88L14.12 14.12" />
                    <path d="M2 2l20 20" />
                    <path d="M4.35 11.9a10 10 0 0 1 18.06 0" />
                    <path d="M21 11.9a10 10 0 0 1-14.11 8.85" />
                    <path d="M12 7.05a4 4 0 0 1 4.54 4.54" />
                </svg>
                } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                }
            </button>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
            <input [type]="showPassword ? 'text' : 'password'" class="form-control" name="confirmPassword"
                [(ngModel)]="form.confirmPassword" required>
            <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
                @if (showPassword) {
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9.88 9.88L14.12 14.12" />
                    <path d="M2 2l20 20" />
                    <path d="M4.35 11.9a10 10 0 0 1 18.06 0" />
                    <path d="M21 11.9a10 10 0 0 1-14.11 8.85" />
                    <path d="M12 7.05a4 4 0 0 1 4.54 4.54" />
                </svg>
                } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                }
            </button>
        </div>
    </div>

    <button type="submit" class="btn btn-dark w-100">
        Continue →
    </button>
</form>
